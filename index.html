{% extends "base.html" %}
{% block content %}
<h1>Products</h1>
<div class="products">
{% for p in products %}
<div class="card">
    {% if p.images %}<img src="{{ url_for('static', filename='uploads/' + p.images[0].filename) }}">{% endif %}
    <h3>{{ p.name }}</h3>
    <p>৳{{ p.price }}</p>
    <a href="/product/{{ p.id }}">Details</a>
    <a href="/add/{{ p.id }}">Add to Cart</a>
</div>
{% endfor %}
</div>
{% endblock %}
